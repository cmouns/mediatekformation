name: Déploiement Continu AlwaysData

on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Déploiement FTP
    runs-on: ubuntu-latest
    steps:
    - name: Récupération du code
      uses: actions/checkout@v3

    - name: Envoi des fichiers vers AlwaysData
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ftp-sebti.alwaysdata.net
        username: sebti
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /www/
        exclude: |
          **/.git*
          **/.git*/**
          **/var/cache/**
          **/var/log/**
          **/.env.local